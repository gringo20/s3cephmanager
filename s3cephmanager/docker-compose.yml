version: "3.9"

services:
  cephs3manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: cephs3manager-web:latest
    container_name: cephs3manager
    ports:
      - "8080:8080"
    volumes:
      - cephs3mgr_data:/data
    environment:
      DATA_DIR: /data
      APP_HOST: 0.0.0.0
      APP_PORT: "8080"
      STORAGE_SECRET: "change-me-in-production-please"
      DEV_RELOAD: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  cephs3mgr_data:
    driver: local
