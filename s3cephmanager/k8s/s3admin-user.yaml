# CephObjectStoreUser — utilizator S3 admin cu control complet
#
# Acest utilizator va fi folosit de CephS3Manager pentru:
#   - gestionarea altor utilizatori S3 (creare, ștergere, modificare)
#   - gestionarea bucket-urilor
#   - citirea statisticilor de utilizare
#   - operații administrative
#
# Credențialele generate automat de Rook vor fi disponibile în Secret-ul:
#   rook-ceph-object-user-ceph-objectstore-s3admin (namespace: rook-ceph)
#
# Aplicare:
#   kubectl apply -f k8s/s3admin-user.yaml
#
# Citire credențiale după aplicare (~30s):
#   kubectl get secret -n rook-ceph rook-ceph-object-user-ceph-objectstore-s3admin \
#     -o go-template='AccessKey: {{.data.AccessKey|base64decode}}{{"\n"}}SecretKey: {{.data.SecretKey|base64decode}}{{"\n"}}'
#
apiVersion: ceph.rook.io/v1
kind: CephObjectStoreUser
metadata:
  name: s3admin
  namespace: rook-ceph
spec:
  store: ceph-objectstore
  displayName: "S3 Admin"
  capabilities:
    user: "*"
    bucket: "*"
    metadata: "*"
    usage: "*"
    zone: "*"
